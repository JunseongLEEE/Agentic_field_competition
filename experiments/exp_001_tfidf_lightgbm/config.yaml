experiment:
  id: exp_001_tfidf_lightgbm
  hypothesis: "Domain-informed TF-IDF (word+char) + sequential + rule + meta features with LightGBM multiclass and balanced weights beats TF-IDF LogReg baseline on Macro-F1"
  expected_macro_f1: 0.55
  verification_protocol:
    accept_if: "CV Macro-F1 > 0.45 with no collapsed classes (F1<0.05)"
    reject_if: "CV Macro-F1 < 0.35 or >=3 collapsed classes"
  created: "2026-07-01"
  git_commit: "unknown"

data:
  train_path: ../../data/train.jsonl
  train_labels_path: ../../data/train_labels.csv
  test_path: ../../data/test.jsonl
  sample_submission_path: ../../data/sample_submission.csv
  target_col: action
  id_col: id
  text_cols: [current_prompt]
  history_col: history

cv:
  n_splits: 3
  strategy: stratified_group
  group_from_id: true          # group = id.rsplit("-step", 1)[0]
  seed: 42

model:
  type: lightgbm
  num_class: 14
  objective: multiclass
  class_weight: balanced
  test_pred_source: full_retrain   # test_preds.npy comes from full-train model
  params:
    n_estimators: 400
    learning_rate: 0.05
    num_leaves: 63
    max_depth: -1
    min_child_samples: 30
    subsample: 0.8
    subsample_freq: 1
    colsample_bytree: 0.6
    reg_lambda: 1.0
    reg_alpha: 0.0
    early_stopping_rounds: 50
    n_jobs: 16

features:
  tfidf:
    word:
      analyzer: word
      ngram_range: [1, 2]
      max_features: 12000
      min_df: 2
    char:
      analyzer: char_wb
      ngram_range: [2, 4]
      max_features: 4000
      min_df: 2

output:
  oof_predictions: oof_preds.npy
  test_predictions: test_preds.npy
  weights_dir: model/
  per_fold_dir: models/
  log_file: train_log.json
