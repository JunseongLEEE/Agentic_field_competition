# Competition Metadata — single source of truth
# Read by: /auto Step 0, /plan, /status, /submit-result, scripts/check_time_state.py

competition:
  name: "SW중심대학협의회 — AI Agent Action Decision"
  organizer: "DACON"
  description: "AI 코딩 에이전트 세션의 현재 상태로부터 다음 행동(action)을 14개 클래스 중 하나로 예측"
  task_type: "multiclass_classification"
  num_classes: 14
  metric: "macro_f1"

input_schema:
  # 데이터 공개 후 정확한 컬럼명/타입은 data_docs/dataset_overview.md에 기록
  current_prompt: "현재 사용자 발화"
  history: "직전까지의 대화/행동 이력"
  session_meta: "요금제, 잔여 토큰 예산, 작업공간 상태 등"

action_classes_hint:
  # 정확한 14개 클래스는 데이터 공개 후 확정
  - "파일 읽기 / 검색 / 수정"
  - "셸 명령 실행"
  - "테스트 실행"
  - "사용자 질문"
  - "기타 탐색·수정·실행·대화 행동"

deadlines:
  preliminary: "2026-07-15T10:00:00+09:00"   # 예선 코드 zip 제출
  final_code: "2026-07-20T10:00:00+09:00"    # 본선 학습 코드 + 발표자료
  poster: "2026-07-30T10:00:00+09:00"        # 포스터 세션

limits:
  # DACON 일일 제출
  daily_submission_limit: 10

  # 평가 서버 제약 (대회 공식 발표)
  max_zip_size_gb: 1                          # ⚠️ 1GB (10GB 아님)
  max_install_minutes: 10                     # requirements.txt 설치 시간
  max_inference_minutes: 10                   # script.py 실행 시간

  # 로컬 학습 가드레일
  max_runtime_minutes_per_experiment: 60      # local train.py 타임아웃

  # 본선 진출
  finalist_top_n: 12

server_spec:
  # 평가 서버 하드웨어 — 모델 크기/메모리 설계 시 참고
  gpu: "T4 (16GB VRAM)"
  cpu: "3 vCPU"
  ram: "12GB"
  network: "offline"
  data_dir: "data/"        # 읽기전용, 서버가 자동 마운트
  output_path: "output/submission.csv"

participation:
  eligible: "AI·SW중심대학 재학·휴학생 (졸업생 불가)"
  team_based: true
  registration_period: "2026-05-26 ~ 2026-06-08"

# Tracking — managed by scripts/track_submission.py + /submit-result
# DO NOT manually edit submissions_log; use /submit-result skill
submissions_log: []
