competition:
  name: SW중심대학협의회 — AI Agent Action Decision
  organizer: DACON
  description: AI 코딩 에이전트 세션의 현재 상태로부터 다음 행동(action)을 14개 클래스 중 하나로 예측
  task_type: multiclass_classification
  num_classes: 14
  metric: macro_f1
input_schema:
  current_prompt: 현재 사용자 발화
  history: 직전까지의 대화/행동 이력
  session_meta: 요금제, 잔여 토큰 예산, 작업공간 상태 등
action_classes_hint:
- 파일 읽기 / 검색 / 수정
- 셸 명령 실행
- 테스트 실행
- 사용자 질문
- 기타 탐색·수정·실행·대화 행동
deadlines:
  preliminary: '2026-07-15T10:00:00+09:00'
  final_code: '2026-07-20T10:00:00+09:00'
  poster: '2026-07-30T10:00:00+09:00'
limits:
  daily_submission_limit: 20
  max_zip_size_gb: 1
  max_install_minutes: 10
  max_inference_minutes: 10
  max_runtime_minutes_per_experiment: 60
  finalist_top_n: 12
server_spec:
  gpu: T4 (16GB VRAM)
  cpu: 3 vCPU
  ram: 12GB
  network: offline
  data_dir: data/
  output_path: output/submission.csv
participation:
  eligible: AI·SW중심대학 재학·휴학생 (졸업생 불가)
  team_based: true
  registration_period: 2026-05-26 ~ 2026-06-08
